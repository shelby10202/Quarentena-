<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de peças Quarentena</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<div id="alert-container"></div>

<body>
<body>

<div id="login-screen">

  <form class="form" id="loginForm">
    <p id="heading">Login</p>

    <div class="field">
      <svg class="input-icon" viewBox="0 0 16 16">
        <path d="M13.106 7.222"></path>
      </svg>

      <input id="loginEmail" class="input-field" type="email" placeholder="Email">
    </div>

    <div class="field">
      <svg class="input-icon" viewBox="0 0 16 16">
        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2z"></path>
      </svg>

      <input id="loginSenha" class="input-field" type="password" placeholder="Senha">
    </div>

    <div class="btn">
      <button type="submit" class="button1">Login</button>
      <button type="button" class="button2" id="signupBtn">Criar</button>
    </div>
  </form>

</div>

<header>
  <h1>Controle de peças Quarentena</h1>
</header>

<nav class="tabs">
  <button onclick="showTab('tabela')">Tabela</button>
  <button onclick="showTab('dashboard')">Dashboard</button>
</nav>

<section id="tabela" class="tab active">
<table>
<thead>

<tr class="input-row">
<td><input id="newPrefixo" class="input-custom" placeholder="PR-XXX"></td>
<td><input id="newProtocolo" class="input-custom" placeholder="HBRQ-XXX"></td>

<td>
<select id="newSetor" class="input-custom">
<option value="">-</option>
<option value="civil">Civil</option>
<option value="militar">Militar</option>
</select>
</td>

<td>
<select id="newEngenharia" class="input-custom">
<option value="">-</option>
<option value="aprovado">Sim</option>
<option value="espera">Em espera</option>
</select>
</td>

<td>
<select id="newStatus" class="input-custom">
<option value="">-</option>
<option value="entregue">Entregue</option>
<option value="scrap">Scrap</option>
<option value="descarte">Descarte</option>
<option value="espera_cliente">Aguardando Cliente</option>
<option value="outros">Outros</option>
</select>
</td>

<td><button id="addBtn" disabled>
  <span class="button_top">Adicionar</span>
</button></td>
<td></td>
</tr>

<tr>
<th>Prefixo</th>
<th>Protocolo</th>
<th>Setor</th>
<th>Engenharia</th>
<th>Status</th>
<th>Data</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="table_body"></tbody>
</table>
</section>

<section id="dashboard" class="tab">

<div class="dashboard-container">

<div class="cards">

  <div class="card espera">
    <div class="card-title">Em Engenharia (Espera)</div>
    <span id="count_espera">0</span>
  </div>

  <div class="card scrap">
    <div class="card-title">Scrap</div>
    <span id="count_scrap">0</span>
  </div>

  <div class="card entregue">
    <div class="card-title">Entregues</div>
    <span id="count_entregue">0</span>
  </div>

  <div class="card outros">
    <div class="card-title">Outros</div>
    <span id="count_outros">0</span>
  </div>
</div>

<div class="graficos-container">
  <div class="grafico-box">
    <h3>Evolução</h3>
    <canvas id="grafico"></canvas>
  </div>

  <div class="grafico-box">
    <h3>Status</h3>
    <canvas id="graficoPizza"></canvas>
  </div>
</div>

</div>

</section>

<!-- 🔥 SCRIPT PRINCIPAL AGORA É MODULE -->
<script type="module" src="script.js"></script>



</body>
</html>
