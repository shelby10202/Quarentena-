<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de peças Quarentena</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="alert-container"></div>

<!-- LOGIN -->
<div id="login-screen">
  <form class="form" id="loginForm">
    <p id="heading">Login</p>

    <div class="field">
      <input id="loginEmail" class="input-field" type="email" placeholder="Email">
    </div>

    <div class="field">
      <input id="loginSenha" class="input-field" type="password" placeholder="Senha">
    </div>

    <div class="btn">
      <button type="submit" class="button1">Login</button>
      <button type="button" class="button2" id="signupBtn">Criar</button>
    </div>
  </form>
</div>

<div id="loader-screen" style="display: none;">
  <div class="loader"></div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">Controle Descarte e Entrega</div>

  <nav class="menu">
    <a onclick="showTab('tabela')">Tabela</a>
    <a onclick="showTab('dashboard')">Dashboard</a>
    <a onclick="showTab('historico')">Histórico</a>
  </nav>

  <div class="user-area">
    <span id="userEmail">...</span>
  </div>
</header>

<!-- TABELA -->
<section id="tabela" class="tab active">
<table>
<thead>

<tr class="input-row">
<td><input id="newPrefixo" class="input-custom" placeholder="PR-XXX"></td>
<td><input id="newProtocolo" class="input-custom" placeholder="HBRQ-XXX"></td>

<td>
<select id="newSetor" class="input-custom">
<option value="">-</option>
<option value="Civil">Civil</option>
<option value="Militar">Militar</option>
</select>
</td>

<td>
<select id="newEngenharia" class="input-custom">
<option value="">-</option>
<option value="Aprovado">Sim</option>
<option value="espera">Em espera</option>
</select>
</td>

<td>
<select id="newStatus" class="input-custom">
<option value="">-</option>
<option value="entregue">Entregue</option>
<option value="Descaracterização">Scrap</option>
<option value="descarte">Descarte</option>
<option value="espera_cliente">Aguardando Cliente</option>
<option value="outros">Outros</option>
</select>
</td>

<td>
<button id="addBtn" disabled>
<span class="button_top">Adicionar</span>
</button>
</td>
<td></td>
</tr>

<tr>
<th>Prefixo</th>
<th>Protocolo</th>
<th>Setor</th>
<th>Engenharia</th>
<th>Status</th>
<th>Data</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="table_body"></tbody>
</table>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="tab">
<div class="dashboard-container">

<div class="cards">
<div class="card espera">
<div class="card-title">Em Engenharia</div>
<span id="count_espera">0</span>
</div>

<div class="card scrap">
<div class="card-title">Scrap</div>
<span id="count_scrap">0</span>
</div>

<div class="card entregue">
<div class="card-title">Entregues</div>
<span id="count_entregue">0</span>
</div>

<div class="card outros">
<div class="card-title">Total</div>
<span id="count_outros">0</span>
</div>
</div>

<div class="graficos-container">
<div class="grafico-box">
<h3>Evolução</h3>
<canvas id="grafico"></canvas>
</div>

<div class="grafico-box">
<h3>Status</h3>
<canvas id="graficoPizza"></canvas>
</div>
</div>

</div>
</section>

<!-- HISTÓRICO -->
<section id="historico" class="tab">
<div class="dashboard-container">

<h3>Histórico</h3>

<div class="historico-filtros">
<input id="filtroPrefixo" class="input-custom" placeholder="Prefixo">
<input id="filtroUsuario" class="input-custom" placeholder="Usuário">
</div>

<div id="timeline"></div>

</div>
</section>

<script type="module" src="script.js"></script>

</body>
</html>
